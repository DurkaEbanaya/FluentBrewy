name: Release

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash -euo pipefail {0}

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

env:
  DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM }}

jobs:
  build:
    name: Build
    runs-on: macos-26
    environment:
      name: release
      deployment: false
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      build_number: ${{ steps.version.outputs.build_number }}
      artifact_name: "Brewy-${{ steps.version.outputs.tag }}.zip"
    permissions:
      contents: write # required to create tag
    env:
      TEMPORARY_CERTIFICATE_FILE: "brewy_developer_id_certificate.p12"
      TEMPORARY_KEYCHAIN_FILE: "brewy_signing.keychain-db"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Extract version from Xcode project
        id: version
        run: |
          SETTINGS=$(xcodebuild -project Brewy.xcodeproj -target Brewy -configuration Release -showBuildSettings 2>/dev/null)
          TAG=$(echo "${SETTINGS}" | awk -F' = ' '/^[[:space:]]*MARKETING_VERSION[[:space:]]*=/ {print $2; exit}')
          BUILD_NUMBER=$(echo "${SETTINGS}" | awk -F' = ' '/^[[:space:]]*CURRENT_PROJECT_VERSION[[:space:]]*=/ {print $2; exit}')
          if [[ -z "${TAG}" ]]; then
            echo "::error::Could not extract MARKETING_VERSION from Brewy target"
            exit 1
          fi
          if [[ -z "${BUILD_NUMBER}" ]]; then
            echo "::error::Could not extract CURRENT_PROJECT_VERSION from Brewy target"
            exit 1
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "build_number=${BUILD_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "TAG=${TAG}" >> "${GITHUB_ENV}"

      - name: Create tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          gh api "repos/${REPOSITORY}/git/refs" \
            -f "ref=refs/tags/${TAG}" \
            -f "sha=${COMMIT_SHA}"

      - name: Create and unlock temporary macOS keychain
        run: |
          # Keep xtrace disabled here: this password is generated at runtime and is not a registered secret.
          set +x
          TEMPORARY_KEYCHAIN_PASSWORD="$(openssl rand -base64 20)"
          echo "::add-mask::${TEMPORARY_KEYCHAIN_PASSWORD}"
          TEMPORARY_KEYCHAIN_PATH="${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}"
          security create-keychain -p "${TEMPORARY_KEYCHAIN_PASSWORD}" "${TEMPORARY_KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${TEMPORARY_KEYCHAIN_PATH}"
          security unlock-keychain -p "${TEMPORARY_KEYCHAIN_PASSWORD}" "${TEMPORARY_KEYCHAIN_PATH}"

      - name: Create temporary certificate file
        env:
          DEVELOPER_ID_CERTIFICATE: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
        run: echo -n "${DEVELOPER_ID_CERTIFICATE}" |
          base64 --decode --output="${RUNNER_TEMP}/${TEMPORARY_CERTIFICATE_FILE}"

      - name: Import certificate into keychain
        env:
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: security import "${RUNNER_TEMP}/${TEMPORARY_CERTIFICATE_FILE}"
          -k "${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}"
          -P "${DEVELOPER_ID_CERTIFICATE_PASSWORD}"
          -t cert -f pkcs12 -A

      - name: Clean up temporary certificate file
        if: always()
        run: rm -f "${RUNNER_TEMP}/${TEMPORARY_CERTIFICATE_FILE}"

      - name: Open keychain
        run: security list-keychain -d user -s "${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}"

      - name: Archive
        run: |
          xcodebuild archive \
            -project Brewy.xcodeproj \
            -scheme Brewy \
            -destination 'generic/platform=macOS' \
            -configuration Release \
            -archivePath "${RUNNER_TEMP}/Brewy.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${DEVELOPMENT_TEAM}" \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            EXCLUDED_ARCHS=x86_64

      - name: Export
        run: |
          cat > "${RUNNER_TEMP}/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>${DEVELOPMENT_TEAM}</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "${RUNNER_TEMP}/Brewy.xcarchive" \
            -exportOptionsPlist "${RUNNER_TEMP}/ExportOptions.plist" \
            -exportPath "${RUNNER_TEMP}/export"

      - name: Clean up temporary keychain
        if: always()
        run: |
          if [[ -f "${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}" ]]; then
            security delete-keychain "${RUNNER_TEMP}/${TEMPORARY_KEYCHAIN_FILE}"
          fi

      - name: Package
        run: |
          ditto -c -k --keepParent \
            "${RUNNER_TEMP}/export/Brewy.app" \
            "${RUNNER_TEMP}/Brewy-${TAG}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "Brewy-${{ steps.version.outputs.tag }}.zip"
          path: "${{ runner.temp }}/Brewy-${{ steps.version.outputs.tag }}.zip"

  release:
    name: Release
    needs: build
    runs-on: macos-26
    environment:
      name: release
      deployment: false
    permissions:
      contents: write # required to create GitHub releases
      attestations: write # required to attest the published (notarized + stapled) asset
      id-token: write # required to generate build provenance attestations
    env:
      TAG: ${{ needs.build.outputs.tag }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: "${{ needs.build.outputs.artifact_name }}"

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          ARTIFACT_NAME: ${{ needs.build.outputs.artifact_name }}
        run: |
          xcrun notarytool submit "${ARTIFACT_NAME}" \
            --team-id "${DEVELOPMENT_TEAM}" \
            --apple-id "${APPLE_ID}" \
            --password "${NOTARIZATION_PASSWORD}" \
            --wait
          ditto -xk "${ARTIFACT_NAME}" "${RUNNER_TEMP}/staple"
          xcrun stapler staple "${RUNNER_TEMP}/staple/Brewy.app"
          ditto -c -k --keepParent \
            "${RUNNER_TEMP}/staple/Brewy.app" \
            "${ARTIFACT_NAME}"

      - name: Generate build provenance for the published asset
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          # Attest the final notarized + stapled zip that is actually uploaded to the release, so
          # `gh attestation verify` against the published download matches the attested digest.
          subject-path: ${{ needs.build.outputs.artifact_name }}

      - name: Download Sparkle
        env:
          # Keep in lockstep with the Sparkle version pinned in Package.resolved; verify the
          # download against a known SHA-256 before running sign_update against the private key.
          SPARKLE_VERSION: "2.9.3"
          SPARKLE_SHA256: "74a07da821f92b79310009954c0e15f350173374a3abe39095b4fc5096916be6"
        run: |
          curl -fsSL -o "${RUNNER_TEMP}/sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          echo "${SPARKLE_SHA256}  ${RUNNER_TEMP}/sparkle.tar.xz" | shasum -a 256 -c -
          mkdir -p "${RUNNER_TEMP}/sparkle"
          tar xf "${RUNNER_TEMP}/sparkle.tar.xz" -C "${RUNNER_TEMP}/sparkle"

      - name: Sign update with Sparkle EdDSA
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          ARTIFACT_NAME: ${{ needs.build.outputs.artifact_name }}
        run: |
          SPARKLE_KEY_FILE="${RUNNER_TEMP}/sparkle_private_key"
          trap 'rm -f "${SPARKLE_KEY_FILE}"' EXIT
          echo "${SPARKLE_KEY}" > "${SPARKLE_KEY_FILE}"
          SIG_OUTPUT=$("${RUNNER_TEMP}/sparkle/bin/sign_update" "${ARTIFACT_NAME}" --ed-key-file "${SPARKLE_KEY_FILE}" 2>&1)
          echo "SPARKLE_SIG=$(echo "${SIG_OUTPUT}" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)" >> "${GITHUB_ENV}"
          echo "SPARKLE_LENGTH=$(echo "${SIG_OUTPUT}" | grep -o 'length="[^"]*"' | cut -d'"' -f2)" >> "${GITHUB_ENV}"

      - name: Create release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: ${{ needs.build.outputs.artifact_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh release create "${TAG}" \
            --repo "${REPOSITORY}" \
            --title "${TAG}" \
            --generate-notes \
            "${ARTIFACT_NAME}"
          gh release view "${TAG}" \
            --repo "${REPOSITORY}" \
            --json body \
            --jq '.body' > "${RUNNER_TEMP}/raw_notes.md"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          persist-credentials: false

      - name: Format release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 .github/format-release-notes.py \
            "${RUNNER_TEMP}/raw_notes.md" "${TAG}" \
            > "${RUNNER_TEMP}/formatted_notes.md"
          python3 .github/format-release-notes.py \
            "${RUNNER_TEMP}/raw_notes.md" "${TAG}" --html \
            > "${RUNNER_TEMP}/release_notes.html"
          gh release edit "${TAG}" \
            --repo "${REPOSITORY}" \
            --notes-file "${RUNNER_TEMP}/formatted_notes.md"

      - name: Update appcast
        env:
          ARTIFACT_NAME: ${{ needs.build.outputs.artifact_name }}
          REPOSITORY: ${{ github.repository }}
          BUILD_NUMBER: ${{ needs.build.outputs.build_number }}
        run: |
          export PUBDATE="$(date -u '+%a, %d %b %Y %H:%M:%S %z')"
          export DOWNLOAD_URL="https://github.com/${REPOSITORY}/releases/download/${TAG}/${ARTIFACT_NAME}"
          export RELEASE_NOTES_HTML="$(cat "${RUNNER_TEMP}/release_notes.html")"
          envsubst '$TAG $PUBDATE $BUILD_NUMBER $DOWNLOAD_URL $SPARKLE_LENGTH $SPARKLE_SIG $RELEASE_NOTES_HTML' \
            < .github/appcast-template.xml > appcast.xml

      - name: Push appcast
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git"
          cp appcast.xml "${RUNNER_TEMP}/appcast.xml"
          git fetch origin appcast
          git checkout appcast
          cp "${RUNNER_TEMP}/appcast.xml" appcast.xml
          git add appcast.xml
          git diff --cached --quiet && exit 0
          git commit -m "Update appcast for ${TAG}"
          git push origin appcast
